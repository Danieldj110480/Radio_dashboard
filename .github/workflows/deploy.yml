name: Deploy to FTP

on:
  push:
    branches:
      - main # O master, dependiendo del nombre de tu rama principal

jobs:
  build-and-deploy:
    name: Build and Deploy to FTP
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout del código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Instalar dependencias
        run: npm install

      - name: 🔨 Construir el proyecto (Build Vite)
        run: npm run build

      - name: 🚀 Subir por FTP al servidor
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # server-dir: ./public_html/ # Descomenta y ajusta esta línea si tu dominio apunta a una carpeta específica en el servidor (ej. ./public_html/ o ./www/)
